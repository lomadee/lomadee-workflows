name: Coolify Build Deploy
on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      coolify_uuid:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "22"
      build_profile:
        required: false
        type: string
        default: default

concurrency:
  group: coolify-deploy-${{ inputs.app_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build and deploy ${{ inputs.app_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DO Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DOCR_USERNAME }}
          password: ${{ secrets.DOCR_TOKEN }}

      - name: Build and push (default)
        if: inputs.build_profile != 'nextjs'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: NPM_TOKEN=${{ secrets.GH_TOKEN }}
          secrets: npm_token=${{ secrets.GH_TOKEN }}
          tags: |
            registry.digitalocean.com/lomadee/${{ inputs.app_name }}:latest
            registry.digitalocean.com/lomadee/${{ inputs.app_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (nextjs)
        if: inputs.build_profile == 'nextjs'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            NPM_TOKEN=${{ secrets.GH_TOKEN }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_PROXY_URL=${{ secrets.NEXT_PUBLIC_PROXY_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_USER=${{ secrets.DB_USER }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            AMQP_URL=${{ secrets.AMQP_URL }}
            AMQP_COMMISSION_URL=${{ secrets.AMQP_COMMISSION_URL }}
          secrets: npm_token=${{ secrets.GH_TOKEN }}
          tags: |
            registry.digitalocean.com/lomadee/${{ inputs.app_name }}:latest
            registry.digitalocean.com/lomadee/${{ inputs.app_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify deploy
        run: |
          curl -fsSL --max-time 120 --retry 3 --retry-delay 5 \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ inputs.coolify_uuid }}&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
