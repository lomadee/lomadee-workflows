name: Coolify Build Deploy
on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      coolify_uuid:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "22"

concurrency:
  group: coolify-deploy-${{ inputs.app_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build and deploy ${{ inputs.app_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DO Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DOCR_TOKEN }}
          password: ${{ secrets.DOCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: NPM_TOKEN=${{ secrets.GH_TOKEN }}
          secrets: npm_token=${{ secrets.GH_TOKEN }}
          tags: |
            registry.digitalocean.com/lomadee/${{ inputs.app_name }}:latest
            registry.digitalocean.com/lomadee/${{ inputs.app_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify deploy
        run: |
          curl -fsSL \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ inputs.coolify_uuid }}&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
